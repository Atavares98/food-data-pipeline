services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: andre
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: fooddata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  postgres_data: